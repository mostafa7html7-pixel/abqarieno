<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سبورة المحترفين Ultra v6.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --dark-bg: #727171;
            --panel-bg: #1e1e1e;
            --accent: #bb86fc;
            --border: #333;
        }

        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: var(--dark-bg); color: white; }

        /* الهيكل الرئيسي */
        .app-container { display: flex; flex-direction: column; height: 100vh; }

        /* البار العلوي */
        header {
            height: 60px; background: var(--panel-bg); display: flex; align-items: center;
            justify-content: space-between; padding: 0 20px; border-bottom: 1px solid var(--border);
        }

        /* شريط الأدوات الجانبي */
        .main-content { display: flex; flex: 1; position: relative; }
        
        .sidebar {
            width: 70px; background: var(--panel-bg); border-left: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; padding: 15px 0; gap: 15px;
        }

        .tool-btn {
            width: 45px; height: 45px; border-radius: 10px; border: none; background: #2d2d2d;
            color: #aaa; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; font-size: 18px;
        }

        .tool-btn:hover { background: #3d3d3d; color: white; }
        .tool-btn.active { background: var(--accent); color: #000; }

        /* منطقة الكانفاس */
        #canvas-wrapper {
            flex: 1; position: relative; background-image: 
                radial-gradient(#333 1px, transparent 1px);
            background-size: 30px 30px; /* شكل الشبكة */
            overflow: hidden;
        }

        canvas { box-shadow: 0 0 50px rgba(0,0,0,0.5); }

        /* لوحة التحكم اليمنى (الطبقات والذكاء الاصطناعي) */
        .right-panel {
            width: 250px; background: var(--panel-bg); border-right: 1px solid var(--border);
            padding: 15px; display: flex; flex-direction: column; gap: 20px;
        }

        .panel-section { background: #2d2d2d; padding: 10px; border-radius: 8px; }
        .panel-section h4 { margin: 0 0 10px 0; font-size: 14px; color: var(--accent); }

        .layer-item {
            background: #3d3d3d; padding: 8px; border-radius: 5px; margin-bottom: 5px;
            font-size: 12px; display: flex; justify-content: space-between;
        }

        /* أزرار سريعة */
        .zoom-controls {
            position: absolute; bottom: 20px; right: 20px; display: flex; gap: 10px;
            background: var(--panel-bg); padding: 10px; border-radius: 30px; border: 1px solid var(--border);
        }

        #ai-btn {
            background: linear-gradient(45deg, #8a2be2, #00d1b2);
            color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div style="font-weight: bold; font-size: 20px;"><i class="fas fa-chalkboard"></i> WHITEBOARD PRO <span style="font-size: 10px; color: var(--accent);">ULTRA</span></div>
        <div style="display: flex; gap: 15px;">
            <button onclick="exportSVG()" class="tool-btn" style="width: auto; padding: 0 15px; font-size: 12px;">تصدير SVG</button>
            <button onclick="exportPNG()" class="tool-btn" style="width: auto; padding: 0 15px; font-size: 12px; background: var(--accent); color: black;">حفظ PNG</button>
        </div>
    </header>

    <div class="main-content">
        <div class="sidebar">
            <button class="tool-btn active" id="select-t" onclick="setMode('select')"><i class="fas fa-mouse-pointer"></i></button>
            <button class="tool-btn" id="pen-t" onclick="setMode('pen')"><i class="fas fa-pencil-alt"></i></button>
            <button class="tool-btn" id="rect-t" onclick="addShape('rect')"><i class="far fa-square"></i></button>
            <button class="tool-btn" id="circle-t" onclick="addShape('circle')"><i class="far fa-circle"></i></button>
            <button class="tool-btn" id="text-t" onclick="addText()"><i class="fas fa-font"></i></button>
            <button class="tool-btn" onclick="document.getElementById('imgInput').click()"><i class="fas fa-image"></i></button>
            <input type="file" id="imgInput" hidden accept="image/*">
            <hr style="width: 50%; border: 0.1px solid var(--border);">
            <button class="tool-btn" onclick="deleteSelected()" style="color: #ff5555;"><i class="fas fa-trash"></i></button>
        </div>

        <div id="canvas-wrapper">
            <canvas id="mainCanvas"></canvas>
            <div class="zoom-controls">
                <button onclick="zoomIn()" class="tool-btn" style="width:30px; height:30px;"><i class="fas fa-plus"></i></button>
                <span id="zoom-level">100%</span>
                <button onclick="zoomOut()" class="tool-btn" style="width:30px; height:30px;"><i class="fas fa-minus"></i></button>
            </div>
        </div>

        <div class="right-panel">
            <div class="panel-section">
                <h4>التنسيق</h4>
                <label style="font-size: 12px;">اللون:</label>
                <input type="color" id="colorPicker" value="#bb86fc" style="width: 100%; height: 30px; border: none; background: none; cursor: pointer;">
                <label style="font-size: 12px; margin-top: 10px; display: block;">السمك:</label>
                <input type="range" id="sizePicker" min="1" max="50" value="5" style="width: 100%;">
            </div>

            <div class="panel-section">
                <h4><i class="fas fa-robot"></i> الذكاء الاصطناعي</h4>
                <button id="ai-btn" onclick="aiImprove()">تحسين الرسم بالذكاء الاصطناعي</button>
                <p style="font-size: 10px; color: #888; margin-top: 5px;">* يتطلب الاتصال بـ API لتحليل الكائنات.</p>
            </div>

            <div class="panel-section" style="flex: 1; overflow-y: auto;">
                <h4>الطبقات (Layers)</h4>
                <div id="layers-list">
                    </div>
            </div>
        </div>
    </div>
</div>

<script>
    const canvas = new fabric.Canvas('mainCanvas', {
        width: window.innerWidth - 320,
        height: window.innerHeight - 60,
        fireRightClick: true,
        stopContextMenu: true
    });

    // 1. نظام الأوضاع
    function setMode(mode) {
        canvas.isDrawingMode = (mode === 'pen');
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        if (mode === 'pen') document.getElementById('pen-t').classList.add('active');
        else document.getElementById('select-t').classList.add('active');
    }

    // 2. إضافة الأشكال
    function addShape(type) {
        setMode('select');
        let obj;
        const conf = { left: 100, top: 100, fill: document.getElementById('colorPicker').value, width: 100, height: 100 };
        if (type === 'rect') obj = new fabric.Rect(conf);
        if (type === 'circle') obj = new fabric.Circle({...conf, radius: 50});
        canvas.add(obj);
        updateLayers();
    }

    function addText() {
        setMode('select');
        const text = new fabric.IText('اكتب هنا...', { left: 100, top: 100, fill: 'white', fontFamily: 'Arial' });
        canvas.add(text);
        updateLayers();
    }

    // 3. رفع الصور
    document.getElementById('imgInput').onchange = function(e) {
        const reader = new FileReader();
        reader.onload = (f) => {
            fabric.Image.fromURL(f.target.result, (img) => {
                img.scaleToWidth(200);
                canvas.add(img);
                updateLayers();
            });
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    // 4. الزووم والتحريك (Infinite Canvas Logic)
    canvas.on('mouse:wheel', function(opt) {
        var delta = opt.e.deltaY;
        var zoom = canvas.getZoom();
        zoom *= 0.999 ** delta;
        if (zoom > 20) zoom = 20;
        if (zoom < 0.01) zoom = 0.01;
        canvas.zoomToPoint({ x: opt.e.offsetX, y: opt.e.offsetY }, zoom);
        opt.e.preventDefault();
        opt.e.stopPropagation();
        document.getElementById('zoom-level').innerText = Math.round(zoom * 100) + '%';
    });

    // 5. إدارة الطبقات
    function updateLayers() {
        const list = document.getElementById('layers-list');
        list.innerHTML = "";
        canvas.getObjects().forEach((obj, index) => {
            const item = document.createElement('div');
            item.className = "layer-item";
            item.innerHTML = `<span>${obj.type} ${index + 1}</span> <i class="fas fa-eye"></i>`;
            list.prepend(item);
        });
    }

    canvas.on('object:added', updateLayers);
    canvas.on('object:removed', updateLayers);

    // 6. الحذف والتصدير
    function deleteSelected() {
        canvas.getActiveObjects().forEach(obj => canvas.remove(obj));
        canvas.discardActiveObject().renderAll();
    }

    function exportPNG() {
        const link = document.createElement('a');
        link.download = 'whiteboard.png';
        link.href = canvas.toDataURL({ format: 'png', quality: 1 });
        link.click();
    }

    function exportSVG() {
        const svg = canvas.toSVG();
        const blob = new Blob([svg], {type: 'image/svg+xml'});
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.download = 'design.svg';
        link.href = url;
        link.click();
    }

    // محاكاة الذكاء الاصطناعي
    function aiImprove() {
        alert("جارٍ تحليل الرسم... (هنا يتم الربط مع API مثل Gemini أو OpenAI لتحويل الرسم اليدوي إلى أيقونات احترافية)");
    }

    // تحديث الفرشاة
    document.getElementById('colorPicker').oninput = (e) => {
        canvas.freeDrawingBrush.color = e.target.value;
        if(canvas.getActiveObject()) canvas.getActiveObject().set('fill', e.target.value);
        canvas.renderAll();
    };

    document.getElementById('sizePicker').oninput = (e) => {
        canvas.freeDrawingBrush.width = parseInt(e.target.value);
    };

    setMode('select');
</script>

</body>
</html>
